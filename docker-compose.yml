services:
  backend:
    build: ./backend
    container_name: qr-backend
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///data/data.db
    volumes:
      - ./backend/data.db:/app/data/data.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/data/?page=1&limit=1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: qr-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
