# Staging environment configuration
# Usage: docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d

services:
  backend:
    environment:
      # Staging CORS - lebih permisif dari production
      - CORS_ORIGINS=["https://staging.yourdomain.com", "http://your-server-ip:3000"]
      - DB_ECHO=true  # Enable SQL logging untuk debugging
    
  frontend:
    # Override untuk staging jika perlu
    build:
      args:
        # Kosongkan jika frontend dan backend di domain yang sama
        VITE_API_BASE: ""
