# Production configuration for input.arraayah.my.id
# Usage: docker compose -f docker-compose.yml -f docker-compose.input.yml up -d

services:
  backend:
    environment:
      # CORS untuk subdomain Anda
      - CORS_ORIGINS=["https://input.arraayah.my.id"]
      - DB_ECHO=false
      # API Key Authentication
      - API_KEY=1YNgoj8u9MU5jl9Oe5RRT-P7ZfWmEESeeRB2vzgE5Zw
      
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/data/?page=1&limit=1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    
    restart: always
  
  frontend:
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    
    restart: always
    
    build:
      args:
        # Kosongkan karena frontend dan backend di domain yang sama
        VITE_API_BASE: ""
        # API Key untuk frontend
        VITE_API_KEY: "1YNgoj8u9MU5jl9Oe5RRT-P7ZfWmEESeeRB2vzgE5Zw"
